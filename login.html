<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Shopper's Stop</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-wrapper">
        <div class="login-box">
            <div class="logo login-logo">SHOPPER'S STOP</div>
            <h2>Welcome Back</h2>
            <p>Please enter your details to continue shopping.</p>
            
            <form id="standalone-login-form">
                <div class="input-group">
                    <label for="mobile">Mobile No.</label>
                    <input type="tel" id="mobile" placeholder="Enter your mobile number" required pattern="[0-9]{10}" title="Please enter a valid 10-digit mobile number">
                </div>
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-primary btn-block">Sign In</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Check if already logged in
            const user = localStorage.getItem('shoppers_stop_user');
            if (user) {
                window.location.href = 'index.html';
            }
        });

        document.getElementById('standalone-login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            if (username.trim()) {
                localStorage.setItem('shoppers_stop_user', username.trim());
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
